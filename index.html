<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özür Dilerim Reyyan 🥺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            color: #ff4757;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        p {
            color: #57606f;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yes-btn {
            background-color: #2ed573;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        #yes-btn:hover {
            transform: scale(1.1);
        }

        #no-btn {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        .gif-container img {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            margin-top: 20px;
        }

        /* Kalp animasyonu için CSS */
        .heart {
            position: fixed;
            top: -5vh;
            font-size: 2rem;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <h1>Reyyan... 🥺</h1>
        <p>Seni kırdığım/üzdüğüm için gerçekten çok ama çok özür dilerim.</p>
        <p>Sensiz günlerin hiç tadı tuzu yok. Lütfen beni affet...</p>
        <p><strong>Benimle barışır mısın?</strong></p>
        
        <div class="buttons" id="button-group">
            <button id="yes-btn">Evet! ❤️</button>
            <button id="no-btn">Hayır 💔</button>
        </div>

        <div id="success-message" class="hidden">
            <h1>Yuppiiii! 🎉</h1>
            <p>Beni affettiğin için çok teşekkür ederim! Seni çok seviyorum! ❤️ Sesli girelim mi ?</p>
            <div class="gif-container">
                <!-- Şirin bir sarılma GIF'i -->
                <img src="https://media.tenor.com/bC1F01Vp8K8AAAAj/tkthao219-bubududu.gif" alt="Cute Hug">
            </div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const successMessage = document.getElementById('success-message');
        const mainTexts = document.querySelectorAll('#main-card > h1, #main-card > p');
        const buttonGroup = document.getElementById('button-group');

        // Hayır butonunu kaçırma fonksiyonu
        noBtn.addEventListener('mouseover', () => {
            // Ekran boyutlarını al
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // Butonun yeni rastgele konumu
            const randomX = Math.floor(Math.random() * (windowWidth - 100));
            const randomY = Math.floor(Math.random() * (windowHeight - 50));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        });

        // Mobilde dokunmaya çalışırsa da kaçsın
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const randomX = Math.floor(Math.random() * (windowWidth - 100));
            const randomY = Math.floor(Math.random() * (windowHeight - 50));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        });

        // Evet butonuna tıklandığında
        yesBtn.addEventListener('click', () => {
            // Eski yazıları gizle
            mainTexts.forEach(text => text.classList.add('hidden'));
            buttonGroup.classList.add('hidden');
            
            // Başarı mesajını göster
            successMessage.classList.remove('hidden');
            
            // Kalp yağmurunu başlat
            createHeartRain();
        });

        // Kalp yağmuru efekti
        function createHeartRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                
                // Rastgele yatay konum ve boyut
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                
                // Rastgele düşme süresi
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                document.body.appendChild(heart);
                
                // Ekrandan çıkan kalpleri DOM'dan temizle
                setTimeout(() => {
                    heart.remove();
                }, 5000);
            }, 300); // Her 300ms'de bir yeni kalp
        }
    </script>

</body>
</html>
